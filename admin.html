<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestead Seoul Admin</title>
  <script>
    (function () {
      if (location.hostname.toLowerCase() === "www.homesteadseoul.com") {
        location.replace("https://homesteadseoul.com" + location.pathname + location.search + location.hash);
      }
    })();
  </script>
  <style>
    :root {
      --bg: #faf6f1;
      --card: #ffffff;
      --line: #dfd2c4;
      --ink: #2c2c2c;
      --accent: #c9906a;
      --ok: #216a3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; }
    .who {
      font-size: 13px;
      color: #6f5a47;
    }
    .ghost {
      border: 1px solid #d9c8b6;
      background: transparent;
      color: #5a4736;
      border-radius: 999px;
      min-height: 38px;
      padding: 6px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .help {
      margin: 10px 0 16px;
      color: #705a46;
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 768px) {
      .grid.two { grid-template-columns: 1fr 1fr; }
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #c9b9a7;
      border-radius: 8px;
      min-height: 42px;
      padding: 8px 10px;
      font: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }
    .upload-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
      margin-top: 8px;
    }
    .upload-row input[type="file"] {
      border: 1px dashed #ccb9a6;
      background: #fcf7f2;
      padding: 8px;
      min-height: 42px;
    }
    .preview {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid #ddcebf;
      border-radius: 8px;
      background: #f4ece2;
      display: none;
    }
    .tip {
      margin: 6px 0 0;
      color: #7e634f;
      font-size: 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    button, .link-btn {
      border: 0;
      border-radius: 999px;
      min-height: 44px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .save { background: var(--accent); color: #fff; }
    .reset { background: #2c2c2c; color: #fff; }
    .download { background: #efe2d5; color: #4b3322; }
    .link-btn { background: #f8eee4; color: #4b3322; border: 1px solid #dbcab8; }
    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ok);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top-row">
      <h1>Homestead Seoul Admin</h1>
      <button id="logoutBtn" type="button" class="ghost">로그아웃</button>
    </div>
    <p class="who" id="who"></p>
    <p class="help">
      인증된 관리자 세션에서만 접근 가능합니다. 저장 데이터는 브라우저 localStorage에 기록됩니다.
      <br>`www` 접속은 대표 도메인으로 자동 이동되므로, 하나의 버전만 관리됩니다.
    </p>

    <section class="card">
      <h2>브랜딩</h2>
      <div class="grid two">
        <label>한글 이름
          <input id="brandKo" type="text">
        </label>
        <label>영문 이름
          <input id="brandEn" type="text">
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Hero</h2>
      <div class="grid">
        <label>Hero 이미지 1 URL/경로
          <input id="heroImage0" type="text">
        </label>
        <div class="upload-row">
          <label>Hero 이미지 1 파일 업로드
            <input id="heroUpload0" type="file" accept="image/*">
          </label>
          <img id="heroPreview0" class="preview" alt="Hero 1 preview">
        </div>

        <label>Hero 이미지 2 URL/경로
          <input id="heroImage1" type="text">
        </label>
        <div class="upload-row">
          <label>Hero 이미지 2 파일 업로드
            <input id="heroUpload1" type="file" accept="image/*">
          </label>
          <img id="heroPreview1" class="preview" alt="Hero 2 preview">
        </div>

        <label>Hero 이미지 3 URL/경로
          <input id="heroImage2" type="text">
        </label>
        <div class="upload-row">
          <label>Hero 이미지 3 파일 업로드
            <input id="heroUpload2" type="file" accept="image/*">
          </label>
          <img id="heroPreview2" class="preview" alt="Hero 3 preview">
        </div>
      </div>
      <div class="grid two">
        <label>KO Hero 제목
          <input id="heroTitleKo" type="text">
        </label>
        <label>EN Hero 제목
          <input id="heroTitleEn" type="text">
        </label>
      </div>
      <div class="grid two">
        <label>KO Hero 부제
          <textarea id="heroSubtitleKo"></textarea>
        </label>
        <label>EN Hero 부제
          <textarea id="heroSubtitleEn"></textarea>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>갤러리 이미지 경로 (6장)</h2>
      <div class="grid">
        <label>1 <input id="gallery0" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload0" type="file" accept="image/*">
          <img id="galleryPreview0" class="preview" alt="Gallery 1 preview">
        </div>

        <label>2 <input id="gallery1" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload1" type="file" accept="image/*">
          <img id="galleryPreview1" class="preview" alt="Gallery 2 preview">
        </div>

        <label>3 <input id="gallery2" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload2" type="file" accept="image/*">
          <img id="galleryPreview2" class="preview" alt="Gallery 3 preview">
        </div>

        <label>4 <input id="gallery3" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload3" type="file" accept="image/*">
          <img id="galleryPreview3" class="preview" alt="Gallery 4 preview">
        </div>

        <label>5 <input id="gallery4" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload4" type="file" accept="image/*">
          <img id="galleryPreview4" class="preview" alt="Gallery 5 preview">
        </div>

        <label>6 <input id="gallery5" type="text"></label>
        <div class="upload-row">
          <input id="galleryUpload5" type="file" accept="image/*">
          <img id="galleryPreview5" class="preview" alt="Gallery 6 preview">
        </div>
      </div>
      <p class="tip">업로드한 파일은 현재 브라우저 localStorage에 Data URL로 저장됩니다. 너무 큰 이미지는 저장 실패할 수 있습니다.</p>
    </section>

    <section class="card">
      <h2>가격 문구</h2>
      <div class="grid two">
        <label>KO 단기 메인 <input id="pricingNightlyMainKo" type="text"></label>
        <label>EN 단기 메인 <input id="pricingNightlyMainEn" type="text"></label>
      </div>
      <div class="grid two">
        <label>KO 단기 범위 <input id="pricingNightlyRangeKo" type="text"></label>
        <label>EN 단기 범위 <input id="pricingNightlyRangeEn" type="text"></label>
      </div>
      <div class="grid two">
        <label>KO 월세 메인 <input id="pricingMonthlyMainKo" type="text"></label>
        <label>EN 월세 메인 <input id="pricingMonthlyMainEn" type="text"></label>
      </div>
      <div class="grid two">
        <label>KO 월세 범위 <input id="pricingMonthlyRangeKo" type="text"></label>
        <label>EN 월세 범위 <input id="pricingMonthlyRangeEn" type="text"></label>
      </div>
    </section>

    <section class="card">
      <h2>연락처</h2>
      <div class="grid two">
        <label>문자/SMS 번호 <input id="phone" type="text"></label>
        <label>Email <input id="email" type="email"></label>
      </div>
      <div class="grid two">
        <label>Kakao URL <input id="kakaoUrl" type="text"></label>
        <label>WhatsApp 번호 <input id="whatsappNumber" type="text"></label>
      </div>
      <div class="grid">
        <label>Google Map Embed URL <input id="mapEmbed" type="text"></label>
      </div>
    </section>

    <div class="actions">
      <button class="save" id="saveBtn" type="button">저장</button>
      <button class="reset" id="resetBtn" type="button">초기화</button>
      <button class="download" id="downloadBtn" type="button">JSON 다운로드</button>
      <a class="link-btn" href="index.html" target="_blank" rel="noopener noreferrer">사이트 열기</a>
    </div>
    <p class="status" id="status"></p>
  </main>

  <script>
    const KEY = "homestead_admin_overrides";
    const SESSION_KEY = "homestead_admin_session";
    const FALLBACK_ALLOWED_EMAIL = "homesteadseoul@gmail.com";
    const SESSION_MAX_AGE_MS = 1000 * 60 * 60 * 12;

    const defaults = {
      branding: { ko: "홈스테이드 서울", en: "Homestead Seoul" },
      media: {
        heroImages: ["images/6.png", "images/3.png", "images/4.png"],
        gallery: [
          { src: "images/1.png" },
          { src: "images/2.png" },
          { src: "images/3.png" },
          { src: "images/4.png" },
          { src: "images/5.png" },
          { src: "images/6.png" }
        ]
      },
      translations: {
        ko: {
          heroTitle: "서울 중심부, 나만의 평안한 공간",
          heroSubtitle: "출퇴근과 서울 여행을 모두 편하게 만드는 실속형 스테이.",
          pricingNightlyMain: "₩45,000 / 1박부터",
          pricingNightlyRange: "평일 보통 ₩45,000~₩60,000, 주말/성수기 변동 가능",
          pricingMonthlyMain: "₩650,000 / 월부터",
          pricingMonthlyRange: "객실 타입 및 계약 기간에 따라 상이"
        },
        en: {
          heroTitle: "A Peaceful Space in Central Seoul",
          heroSubtitle: "Practical stay for both daily commuting and city sightseeing.",
          pricingNightlyMain: "From KRW 45,000 / night",
          pricingNightlyRange: "Typical weekday KRW 45,000-60,000, weekend/peak season varies",
          pricingMonthlyMain: "From KRW 650,000 / month",
          pricingMonthlyRange: "Final rate depends on room type and contract length"
        }
      },
      contact: {
        phone: "010-3286-8682",
        email: "Homesteadseoul@gmail.com",
        kakaoUrl: "https://open.kakao.com/o/replace-me",
        whatsappNumber: "821032868682",
        mapEmbed: "https://www.google.com/maps?q=%EC%84%9C%EC%9A%B8%20%EB%B0%A9%EB%B0%B0%EB%8F%99%20911-14&output=embed"
      }
    };

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

    function requireSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) {
          location.replace("admin-login.html");
          return null;
        }
        const session = JSON.parse(raw);
        const email = String(session.email || "").toLowerCase();
        const allowedEmail = String(session.allowedEmail || FALLBACK_ALLOWED_EMAIL).toLowerCase();
        const ts = Number(session.ts || 0);
        if (email !== allowedEmail || !ts || Date.now() - ts > SESSION_MAX_AGE_MS) {
          localStorage.removeItem(SESSION_KEY);
          location.replace("admin-login.html");
          return null;
        }
        return session;
      } catch (_) {
        localStorage.removeItem(SESSION_KEY);
        location.replace("admin-login.html");
        return null;
      }
    }

    function normalizeData(parsed) {
      return {
        branding: { ...defaults.branding, ...(parsed?.branding || {}) },
        media: {
          heroImages: defaults.media.heroImages.map((item, i) => {
            if (typeof parsed?.media?.heroImages?.[i] === "string" && parsed.media.heroImages[i].trim()) {
              return parsed.media.heroImages[i].trim();
            }
            if (i === 0 && typeof parsed?.media?.heroImage === "string" && parsed.media.heroImage.trim()) {
              return parsed.media.heroImage.trim();
            }
            return item;
          }),
          gallery: defaults.media.gallery.map((item, i) => ({
            src: parsed?.media?.gallery?.[i]?.src || item.src
          }))
        },
        translations: {
          ko: { ...defaults.translations.ko, ...(parsed?.translations?.ko || {}) },
          en: { ...defaults.translations.en, ...(parsed?.translations?.en || {}) }
        },
        contact: { ...defaults.contact, ...(parsed?.contact || {}) }
      };
    }

    function readData() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return clone(defaults);
        const parsed = JSON.parse(raw);
        return normalizeData(parsed);
      } catch (_) {
        return clone(defaults);
      }
    }

    async function readServerData() {
      try {
        const response = await fetch("/api/site-config", { cache: "no-store" });
        if (!response.ok) return null;
        const result = await response.json();
        if (!result || !result.ok || !result.config || typeof result.config !== "object") return null;
        try {
          localStorage.setItem(KEY, JSON.stringify(result.config, null, 2));
        } catch (_) {
          // Ignore local cache failures.
        }
        return normalizeData(result.config);
      } catch (_) {
        return null;
      }
    }

    async function writeData(data) {
      let serverSaved = false;
      try {
        const response = await fetch("/api/site-config", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ config: data }),
        });
        const result = await response.json().catch(() => null);
        serverSaved = Boolean(response.ok && result && result.ok);
      } catch (_) {
        serverSaved = false;
      }

      try {
        localStorage.setItem(KEY, JSON.stringify(data, null, 2));
        return { ok: true, serverSaved };
      } catch (err) {
        return {
          ok: false,
          message:
            err && (err.name === "QuotaExceededError" || err.name === "NS_ERROR_DOM_QUOTA_REACHED")
              ? "저장 용량 초과: 이미지 크기를 줄여 다시 업로드해 주세요."
              : "저장 실패: 브라우저 저장소 오류가 발생했습니다.",
        };
      }
    }

    function resizeImageFile(file, maxWidth = 1600, maxHeight = 1600, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(maxWidth / img.width, maxHeight / img.height, 1);
            const targetW = Math.round(img.width * scale);
            const targetH = Math.round(img.height * scale);
            const canvas = document.createElement("canvas");
            canvas.width = targetW;
            canvas.height = targetH;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
              reject(new Error("canvas_unavailable"));
              return;
            }
            ctx.drawImage(img, 0, 0, targetW, targetH);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = () => reject(new Error("image_decode_failed"));
          img.src = String(reader.result || "");
        };
        reader.onerror = () => reject(new Error("file_read_failed"));
        reader.readAsDataURL(file);
      });
    }

    function setPreview(previewId, value) {
      const preview = document.getElementById(previewId);
      if (!preview) return;
      preview.src = value || "";
      preview.style.display = value ? "block" : "none";
    }

    function bindPreviewOnInput(inputId, previewId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      input.addEventListener("input", () => setPreview(previewId, input.value.trim()));
    }

    function bindFileToInput(fileInputId, textInputId, previewId) {
      const fileInput = document.getElementById(fileInputId);
      const textInput = document.getElementById(textInputId);
      if (!fileInput || !textInput) return;

      fileInput.addEventListener("change", async () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        try {
          const dataUrl = await resizeImageFile(file);
          textInput.value = dataUrl;
          setPreview(previewId, dataUrl);
          setStatus("이미지 로드 완료(자동 리사이즈). 저장 버튼을 누르면 반영됩니다.");
        } catch (_) {
          setStatus("이미지 읽기 실패. 다시 시도해 주세요.");
        }
      });
    }

    function fillForm(data) {
      document.getElementById("brandKo").value = data.branding.ko;
      document.getElementById("brandEn").value = data.branding.en;
      const heroImages = Array.isArray(data.media.heroImages) ? data.media.heroImages : defaults.media.heroImages;
      heroImages.forEach((src, i) => {
        const input = document.getElementById("heroImage" + i);
        if (!input) return;
        input.value = src || "";
        setPreview("heroPreview" + i, src || "");
      });
      document.getElementById("heroTitleKo").value = data.translations.ko.heroTitle;
      document.getElementById("heroTitleEn").value = data.translations.en.heroTitle;
      document.getElementById("heroSubtitleKo").value = data.translations.ko.heroSubtitle;
      document.getElementById("heroSubtitleEn").value = data.translations.en.heroSubtitle;
      data.media.gallery.forEach((item, i) => {
        const input = document.getElementById("gallery" + i);
        if (input) {
          input.value = item.src;
          setPreview("galleryPreview" + i, item.src);
        }
      });
      document.getElementById("pricingNightlyMainKo").value = data.translations.ko.pricingNightlyMain;
      document.getElementById("pricingNightlyMainEn").value = data.translations.en.pricingNightlyMain;
      document.getElementById("pricingNightlyRangeKo").value = data.translations.ko.pricingNightlyRange;
      document.getElementById("pricingNightlyRangeEn").value = data.translations.en.pricingNightlyRange;
      document.getElementById("pricingMonthlyMainKo").value = data.translations.ko.pricingMonthlyMain;
      document.getElementById("pricingMonthlyMainEn").value = data.translations.en.pricingMonthlyMain;
      document.getElementById("pricingMonthlyRangeKo").value = data.translations.ko.pricingMonthlyRange;
      document.getElementById("pricingMonthlyRangeEn").value = data.translations.en.pricingMonthlyRange;
      document.getElementById("phone").value = data.contact.phone;
      document.getElementById("email").value = data.contact.email;
      document.getElementById("kakaoUrl").value = data.contact.kakaoUrl;
      document.getElementById("whatsappNumber").value = data.contact.whatsappNumber;
      document.getElementById("mapEmbed").value = data.contact.mapEmbed;
    }

    function getFormData() {
      return {
        branding: {
          ko: document.getElementById("brandKo").value.trim(),
          en: document.getElementById("brandEn").value.trim()
        },
        media: {
          heroImages: Array.from({ length: 3 }, (_, i) => document.getElementById("heroImage" + i).value.trim()),
          heroImage: document.getElementById("heroImage0").value.trim(),
          gallery: Array.from({ length: 6 }, (_, i) => ({
            src: document.getElementById("gallery" + i).value.trim()
          }))
        },
        translations: {
          ko: {
            heroTitle: document.getElementById("heroTitleKo").value.trim(),
            heroSubtitle: document.getElementById("heroSubtitleKo").value.trim(),
            pricingNightlyMain: document.getElementById("pricingNightlyMainKo").value.trim(),
            pricingNightlyRange: document.getElementById("pricingNightlyRangeKo").value.trim(),
            pricingMonthlyMain: document.getElementById("pricingMonthlyMainKo").value.trim(),
            pricingMonthlyRange: document.getElementById("pricingMonthlyRangeKo").value.trim()
          },
          en: {
            heroTitle: document.getElementById("heroTitleEn").value.trim(),
            heroSubtitle: document.getElementById("heroSubtitleEn").value.trim(),
            pricingNightlyMain: document.getElementById("pricingNightlyMainEn").value.trim(),
            pricingNightlyRange: document.getElementById("pricingNightlyRangeEn").value.trim(),
            pricingMonthlyMain: document.getElementById("pricingMonthlyMainEn").value.trim(),
            pricingMonthlyRange: document.getElementById("pricingMonthlyRangeEn").value.trim()
          }
        },
        contact: {
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          kakaoUrl: document.getElementById("kakaoUrl").value.trim(),
          whatsappNumber: document.getElementById("whatsappNumber").value.trim(),
          mapEmbed: document.getElementById("mapEmbed").value.trim()
        }
      };
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const result = await writeData(getFormData());
      if (!result.ok) {
        setStatus(result.message);
        return;
      }
      if (result.serverSaved) {
        setStatus("저장 완료: 모든 기기/브라우저에 반영됩니다.");
      } else {
        setStatus("로컬 저장 완료: 서버 저장 실패로 현재 브라우저에만 반영됩니다.");
      }
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      localStorage.removeItem(KEY);
      fillForm(clone(defaults));
      await writeData(clone(defaults));
      setStatus("초기화 완료");
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      const data = getFormData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "homestead-admin-overrides.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("JSON 다운로드 완료");
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem(SESSION_KEY);
      location.replace("admin-login.html");
    });

    const session = requireSession();
    if (session) {
      document.getElementById("who").textContent = `인증됨: ${session.email}`;
      for (let i = 0; i < 3; i += 1) {
        bindPreviewOnInput("heroImage" + i, "heroPreview" + i);
        bindFileToInput("heroUpload" + i, "heroImage" + i, "heroPreview" + i);
      }
      for (let i = 0; i < 6; i += 1) {
        bindPreviewOnInput("gallery" + i, "galleryPreview" + i);
        bindFileToInput("galleryUpload" + i, "gallery" + i, "galleryPreview" + i);
      }
      (async () => {
        const serverData = await readServerData();
        if (serverData) {
          fillForm(serverData);
          setStatus("서버 설정 로드 완료");
        } else {
          fillForm(readData());
          setStatus("로컬 설정 로드 완료");
        }
      })();
    }
  </script>
</body>
</html>
