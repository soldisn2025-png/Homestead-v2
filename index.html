<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홈스테이드 서울 | Seoul Budget Accommodation</title>
  <meta name="description" content="서울 방배동 고시원 | 저렴하고 깨끗한 단기·월세 숙소 | Seoul budget accommodation">
  <meta property="og:title" content="홈스테이드 서울 | Homestead Seoul">
  <meta property="og:description" content="방배역 인접, 단기/월세 숙소. Commuting and sightseeing friendly Seoul stay.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Serif+KR:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.1/css/glightbox.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#top" class="brand" aria-label="홈으로 이동">
        <span class="brand-kr" id="brandKo">홈스테이드 서울</span>
        <span class="brand-en" id="brandEn">HOMESTEAD SEOUL</span>
      </a>

      <nav class="desktop-nav" aria-label="Main navigation">
        <a href="#about" data-i18n="navAbout"></a>
        <a href="#rooms" data-i18n="navRooms"></a>
        <a href="#location" data-i18n="navLocation"></a>
        <a href="#inquiry" data-i18n="navInquiry"></a>
      </nav>

      <div class="header-actions">
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" data-lang-btn="ko">KO</button>
          <button type="button" data-lang-btn="en">EN</button>
        </div>
        <button class="menu-btn" id="menuBtn" type="button" aria-expanded="false" aria-controls="mobileDrawer">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <aside id="mobileDrawer" class="mobile-drawer" aria-hidden="true">
    <nav aria-label="Mobile navigation">
      <a href="#about" data-i18n="navAbout"></a>
      <a href="#rooms" data-i18n="navRooms"></a>
      <a href="#location" data-i18n="navLocation"></a>
      <a href="#inquiry" data-i18n="navInquiry"></a>
    </nav>
  </aside>

  <main id="top">
    <section class="hero reveal">
      <div class="hero-carousel" id="heroCarousel" aria-hidden="true">
        <img id="heroImage0" src="images/6.png" alt="Seoul city view" class="hero-image active">
        <img id="heroImage1" src="images/3.png" alt="Seoul city view" class="hero-image">
        <img id="heroImage2" src="images/4.png" alt="Seoul city view" class="hero-image">
      </div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-kicker" data-i18n="heroKicker"></p>
        <h1 data-i18n="heroTitle"></h1>
        <p class="hero-subtitle" data-i18n="heroSubtitle"></p>
        <div class="hero-cta">
          <a href="#inquiry" class="btn btn-primary" data-i18n="heroCtaInquiry"></a>
          <a href="#gallery" class="btn btn-secondary" data-i18n="heroCtaGallery"></a>
        </div>
      </div>
    </section>

    <section id="about" class="section section-about reveal">
      <div class="section-head">
        <p class="eyebrow" data-i18n="aboutEyebrow"></p>
        <h2 data-i18n="aboutTitle"></h2>
      </div>
      <div class="feature-grid">
        <article class="feature-card">
          <div class="icon">🚇</div>
          <h3 data-i18n="feature1Title"></h3>
          <p data-i18n="feature1Desc"></p>
        </article>
        <article class="feature-card">
          <div class="icon">🛁</div>
          <h3 data-i18n="feature2Title"></h3>
          <p data-i18n="feature2Desc"></p>
        </article>
        <article class="feature-card">
          <div class="icon">🧺</div>
          <h3 data-i18n="feature3Title"></h3>
          <p data-i18n="feature3Desc"></p>
        </article>
        <article class="feature-card">
          <div class="icon">🌍</div>
          <h3 data-i18n="feature4Title"></h3>
          <p data-i18n="feature4Desc"></p>
        </article>
      </div>
    </section>

    <section id="gallery" class="section reveal">
      <div class="section-head">
        <p class="eyebrow" data-i18n="galleryEyebrow"></p>
        <h2 data-i18n="galleryTitle"></h2>
      </div>
      <div class="gallery-grid">
        <a class="glightbox gallery-item" id="galleryItem0" href="images/1.png" data-gallery="rooms" data-title="객실 1 | Room 1">
          <img id="galleryImg0" src="images/1.png" alt="객실 1">
          <span data-i18n="captionRoom1"></span>
        </a>
        <a class="glightbox gallery-item" id="galleryItem1" href="images/2.png" data-gallery="rooms" data-title="복도 | Corridor">
          <img id="galleryImg1" src="images/2.png" alt="복도">
          <span data-i18n="captionCorridor"></span>
        </a>
        <a class="glightbox gallery-item" id="galleryItem2" href="images/3.png" data-gallery="rooms" data-title="입구 복도 | Entry Hallway">
          <img id="galleryImg2" src="images/3.png" alt="입구 복도">
          <span data-i18n="captionEntryHall"></span>
        </a>
        <a class="glightbox gallery-item" id="galleryItem3" href="images/4.png" data-gallery="rooms" data-title="생활공간 | Living Space">
          <img id="galleryImg3" src="images/4.png" alt="생활공간">
          <span data-i18n="captionLivingSpace"></span>
        </a>
        <a class="glightbox gallery-item" id="galleryItem4" href="images/5.png" data-gallery="rooms" data-title="객실 2 | Room 2">
          <img id="galleryImg4" src="images/5.png" alt="객실 2">
          <span data-i18n="captionRoom2"></span>
        </a>
        <a class="glightbox gallery-item" id="galleryItem5" href="images/6.png" data-gallery="rooms" data-title="건물 외관 | Exterior">
          <img id="galleryImg5" src="images/6.png" alt="건물 외관">
          <span data-i18n="captionExterior"></span>
        </a>
      </div>
    </section>

    <section id="rooms" class="section section-pricing reveal">
      <div class="section-head">
        <p class="eyebrow" data-i18n="pricingEyebrow"></p>
        <h2 data-i18n="pricingTitle"></h2>
      </div>
      <div class="pricing-cards">
        <article class="pricing-card">
          <h3 data-i18n="pricingNightlyTitle"></h3>
          <p class="price-main" data-i18n="pricingNightlyMain"></p>
          <p data-i18n="pricingNightlyRange"></p>
        </article>
        <article class="pricing-card">
          <h3 data-i18n="pricingMonthlyTitle"></h3>
          <p class="price-main" data-i18n="pricingMonthlyMain"></p>
          <p data-i18n="pricingMonthlyRange"></p>
        </article>
        <article class="pricing-card">
          <h3 data-i18n="pricingIncludeTitle"></h3>
          <p data-i18n="pricingIncludeBody"></p>
        </article>
      </div>
      <p class="pricing-note" data-i18n="pricingNote"></p>
    </section>

    <section id="location" class="section section-location reveal">
      <div class="section-head">
        <p class="eyebrow" data-i18n="locationEyebrow"></p>
        <h2 data-i18n="locationTitle"></h2>
      </div>
      <div class="location-wrap">
        <iframe
          title="홈스테이드 방배 위치"
          src="https://www.google.com/maps?q=%EC%84%9C%EC%9A%B8%20%EB%B0%A9%EB%B0%B0%EB%8F%99%20911-14&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
        <ul class="location-points">
          <li data-i18n="locPoint1"></li>
          <li data-i18n="locPoint2"></li>
          <li data-i18n="locPoint3"></li>
          <li data-i18n="locPoint4"></li>
          <li data-i18n="locPoint5"></li>
        </ul>
      </div>
    </section>

    <section id="inquiry" class="section section-contact reveal">
      <div class="section-head">
        <p class="eyebrow" data-i18n="contactEyebrow"></p>
        <h2 data-i18n="contactTitle"></h2>
      </div>

      <div class="contact-grid">
        <a id="btnEmail" class="contact-pill pill-email" href="#">
          <span class="pill-icon">📧</span>
          <span>
            <strong data-i18n="contactEmailLabel"></strong>
            <small data-i18n="contactEmailHint"></small>
          </span>
        </a>
        <a id="btnSms" class="contact-pill pill-sms" href="#">
          <span class="pill-icon">📱</span>
          <span>
            <strong data-i18n="contactSmsLabel"></strong>
            <small data-i18n="contactSmsHint"></small>
          </span>
        </a>
        <a id="btnKakao" class="contact-pill pill-kakao" href="#" target="_blank" rel="noopener noreferrer">
          <span class="pill-icon">💬</span>
          <span>
            <strong data-i18n="contactKakaoLabel"></strong>
            <small data-i18n="contactKakaoHint"></small>
          </span>
        </a>
        <a id="btnWhatsapp" class="contact-pill pill-whatsapp" href="#" target="_blank" rel="noopener noreferrer">
          <span class="pill-icon">💬</span>
          <span>
            <strong data-i18n="contactWhatsappLabel"></strong>
            <small data-i18n="contactWhatsappHint"></small>
          </span>
        </a>
      </div>

      <form id="inquiryForm" class="inquiry-form">
        <label>
          <span data-i18n="formName"></span>
          <input type="text" name="name" required maxlength="80">
        </label>
        <label>
          <span data-i18n="formContact"></span>
          <input type="text" name="contact" required maxlength="120">
        </label>
        <label>
          <span data-i18n="formMessage"></span>
          <textarea name="message" required maxlength="1200" data-i18n-placeholder="formMessagePlaceholder"></textarea>
        </label>
        <label class="consent-row">
          <input type="checkbox" name="consent" required>
          <span data-i18n="formConsent"></span>
        </label>
        <input type="hidden" name="language" id="formLanguage" value="ko">
        <input type="hidden" name="turnstileToken" id="turnstileToken" value="">
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-callback="onTurnstileSuccess"></div>
        <button type="submit" class="btn btn-primary full" data-i18n="formSubmit"></button>
      </form>
      <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <footer class="site-footer">
    <p data-i18n="footerAddress"></p>
    <div class="footer-links">
      <a href="#inquiry" data-i18n="footerInquiry"></a>
      <a href="#location" data-i18n="footerLocation"></a>
      <a class="footer-admin" href="admin-login.html">admin</a>
    </div>
    <small>© <span id="year"></span> <span id="footerBrand">Homestead Seoul</span></small>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.1/js/glightbox.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
